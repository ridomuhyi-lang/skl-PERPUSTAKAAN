<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hapus User - SIPUSTAKA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-[#f1f5f9] text-slate-900 h-screen overflow-hidden">
    <div class="h-screen flex flex-col md:flex-row">
      <aside class="w-full md:w-64 h-screen bg-[#030712] text-slate-100 flex-none flex flex-col">
        <div class="px-6 py-6 border-b border-slate-900">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-[#3b82f6] flex items-center justify-center font-bold text-white text-lg">P</div>
            <div>
              <p class="text-[10px] text-slate-500 uppercase tracking-widest">SIPUSTAKA</p>
              <h1 class="text-sm font-bold text-white leading-tight">Sistem Peminjaman<br>Buku</h1>
            </div>
          </div>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-1">
          <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-400 rounded-xl hover:bg-slate-900 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"/></svg>
            Dashboard
          </a>
          <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-400 rounded-xl hover:bg-slate-900 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            Buku
          </a>
          <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-400 rounded-xl hover:bg-slate-900 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            Peminjaman
          </a>
          <a href="{% url 'list_siswa' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-200 bg-slate-900 rounded-xl shadow-inner">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            Daftar User
          </a>
        </nav>
      </aside>

      <main class="flex-1 p-6 md:p-8 overflow-y-auto">
        <div class="flex items-start gap-3 mb-6">
          <a href="{% url 'list_siswa' %}" class="text-slate-400 hover:text-slate-600 mt-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          </a>
          <div>
            <p class="text-xs text-slate-400 font-medium tracking-normal mb-0.5">Kelola User</p>
            <h3 class="text-2xl font-bold text-slate-900 tracking-tight">Hapus User</h3>
          </div>
        </div>

        <div class="bg-white rounded-[28px] p-8 border border-slate-100 max-w-4xl shadow-sm">
          <form method="POST" action="{% url 'delete_siswa' siswa.id %}">
            {% csrf_token %}
            <p class="text-slate-700 text-[15px] mb-2">Anda akan menghapus:</p>
            <h2 class="text-lg font-bold text-slate-900 mb-2">{{ siswa.nama }}</h2>
            <p class="text-slate-400 text-sm mb-6 pb-6 border-b border-slate-100">Data user akan dihapus dari daftar anggota perpustakaan.</p>

            <div class="flex items-center justify-end gap-3">
              <a href="{% url 'list_siswa' %}" class="rounded-2xl border border-slate-200 px-6 py-2.5 font-medium text-slate-600 hover:bg-slate-50 transition text-sm">
                Batal
              </a>
              <button type="submit" class="rounded-2xl bg-[#e11d48] hover:bg-rose-700 px-6 py-2.5 font-medium text-white transition text-sm">
                Hapus
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
