<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Buku - SIPUSTAKA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-[#f1f5f9] text-slate-900 h-screen overflow-hidden">
    <div class="h-screen flex flex-col md:flex-row">
      
      <aside class="w-full md:w-64 h-screen bg-[#030712] text-slate-100 flex-none flex flex-col">
        <div class="px-6 py-6 border-b border-slate-900">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-[#3b82f6] flex items-center justify-center font-bold text-white text-lg">P</div>
            <div>
              <p class="text-[10px] text-slate-500 uppercase tracking-widest">SIPUSTAKA</p>
              <h1 class="text-sm font-bold text-white leading-tight">Sistem Peminjaman<br>Buku</h1>
            </div>
          </div>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-1">
          <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-400 rounded-xl hover:bg-slate-900 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"/></svg>
            Dashboard
          </a>
          <a href="{% url 'list_buku' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-200 bg-slate-900 rounded-xl shadow-inner">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            Buku
          </a>
          <a href="{% url 'list_siswa' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-400 rounded-xl hover:bg-slate-900 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            User
          </a>
        </nav>
      </aside>

      <main class="flex-1 p-6 md:p-8 overflow-y-auto">
        <div class="flex items-center gap-2 text-sm text-slate-400 font-medium mb-1">
          <a href="{% url 'list_buku' %}" class="hover:text-slate-600">Kelola Buku</a>
          <span>&rarr;</span>
          <span class="text-slate-600">Edit Buku</span>
        </div>
        <h3 class="text-3xl font-bold text-slate-900 tracking-tight mb-6">Edit Buku</h3>

        <div class="bg-white rounded-[24px] border border-slate-100 shadow-sm p-6 max-w-5xl">
          <form method="POST">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Judul Buku</label>
                <input type="text" name="judul" value="{{ buku.judul }}" required class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-3 text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition" />
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Pengarang</label>
                <input type="text" name="pengarang" value="{{ buku.pengarang }}" required class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-3 text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition" />
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Kategori</label>
                <select name="kategori" class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-3 text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
                  <option value="Novel" {% if buku.kategori == "Novel" %}selected{% endif %}>Novel</option>
                  <option value="Sains" {% if buku.kategori == "Sains" %}selected{% endif %}>Sains</option>
                  <option value="Komputer" {% if buku.kategori == "Komputer" %}selected{% endif %}>Komputer</option>
                  <option value="Sejarah" {% if buku.kategori == "Sejarah" %}selected{% endif %}>Sejarah</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Penerbit</label>
                <input type="text" name="penerbit" value="{{ buku.penerbit }}" required class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-3 text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition" />
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Tahun Terbit</label>
                <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit }}" required class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-3 text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition" />
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Stok</label>
                <input type="number" name="stok" value="{{ buku.stok }}" required class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-3 text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition" />
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">ISBN</label>
                <input type="text" name="isbn" value="{{ buku.isbn }}" class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-3 text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition" placeholder="Contoh: 978-979-3062-79-2" />
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Rak / Lokasi</label>
                <input type="text" name="rak" value="{{ buku.rak }}" required class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-3 text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition" />
              </div>
            </div>

            <div class="mb-6">
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Deskripsi</label>
              <textarea name="deskripsi" rows="3" class="w-full bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-3 text-slate-800 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">{{ buku.deskripsi }}</textarea>
            </div>

            <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
              <a href="{% url 'list_buku' %}" class="px-6 py-2.5 rounded-xl border border-slate-200 font-medium text-sm text-slate-600 hover:bg-slate-50 transition">Batal</a>
              <button type="submit" class="bg-[#2563eb] text-white px-6 py-2.5 rounded-xl font-medium text-sm hover:bg-blue-700 transition shadow-sm">Perbarui Buku</button>
            </div>
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
