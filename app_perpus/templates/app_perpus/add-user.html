<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah User - Sistem Peminjaman Buku SIPUSTAKA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                200: "#bfdbfe",
                300: "#93c5fd",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                800: "#1e40af",
                900: "#1e3a8a",
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-900 h-screen overflow-hidden">
    <div class="h-screen flex flex-col md:flex-row">
      <aside
        class="w-full md:w-72 h-screen bg-slate-950 text-slate-100 flex-none flex flex-col"
      >
        <div class="px-6 py-7 border-b border-slate-800">
          <div class="flex items-center gap-3">
            <div
              class="w-11 h-11 rounded-2xl bg-gradient-to-br from-brand-500 to-sky-400 flex items-center justify-center shadow-lg shadow-slate-900/25"
            >
              <span class="text-xl font-bold">P</span>
            </div>
            <div>
              <p class="text-sm uppercase text-slate-400 tracking-[0.25em]">
                SIPUSTAKA
              </p>
              <h1 class="text-xl font-semibold">Sistem Peminjaman Buku</h1>
            </div>
          </div>
        </div>
        <nav class="flex-1 overflow-y-auto px-4 py-6 space-y-1">
          <a
            href="{% url 'dashboard' %}"
            class="page-link w-full text-left rounded-2xl px-4 py-3 flex items-center gap-3 text-slate-300 hover:text-white hover:bg-slate-900 transition"
          >
            <span class="material-icons-outlined">dashboard</span>
            Dashboard
          </a>
          <a
            href="{% url 'list_siswa' %}"
            class="page-link w-full text-left rounded-2xl px-4 py-3 flex items-center gap-3 text-slate-300 hover:text-white hover:bg-slate-900 transition"
          >
            <span class="material-icons-outlined">group</span>
            User
          </a>
        </nav>
        <div class="mt-auto px-6 pb-6">
          <div
            class="rounded-3xl bg-slate-900 p-5 shadow-xl shadow-slate-900/20"
          >
            <p class="text-sm text-slate-400">Admin Aktif</p>
            <p class="mt-2 font-semibold text-white">Budi Siregar</p>
          </div>
        </div>
      </aside>

      <main class="flex-1 overflow-y-auto p-6 md:p-8 flex flex-col">
        <div class="mb-6">
          <a
            href="{% url 'list_siswa' %}"
            class="inline-flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-slate-800 transition mb-2"
          >
            <span class="material-icons-outlined text-base">arrow_back</span>
            Kembali ke Daftar User
          </a>
          <h3 class="text-2xl font-semibold text-slate-900">Tambah User Baru</h3>
        </div>

        <div class="max-w-2xl w-full rounded-3xl bg-white p-6 md:p-8 shadow-lg shadow-slate-200/60 border border-slate-200">
          
          <form id="form-add-user" method="POST" action="{% url 'add_siswa' %}" class="space-y-5">
            {% csrf_token %}
            
            <div>
              <label for="nama" class="block text-sm font-medium text-slate-700 mb-2">Nama Lengkap</label>
              <input
                type="text"
                id="nama"
                name="nama"
                required
                placeholder="Masukkan nama lengkap siswa"
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-brand-500 transition"
              />
            </div>

            <div>
              <label for="kelas" class="block text-sm font-medium text-slate-700 mb-2">Kelas</label>
              <input
                type="text"
                id="kelas"
                name="kelas"
                required
                placeholder="Contoh: XI IPA 1 / XII IPS 2"
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-brand-500 transition"
              />
            </div>

            <div>
              <label for="nis" class="block text-sm font-medium text-slate-700 mb-2">Nomor Induk Siswa (NIS)</label>
              <input
                type="text"
                id="nis"
                name="nis"
                required
                placeholder="Masukkan NIS unik siswa"
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-brand-500 transition"
              />
            </div>

            <div>
              <label for="status" class="block text-sm font-medium text-slate-700 mb-2">Status Akun</label>
              <select
                id="status"
                name="status"
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-brand-500 transition"
              >
                <option value="Aktif">Aktif</option>
                <option value="Nonaktif">Nonaktif</option>
              </select>
            </div>

            <div class="pt-2 flex justify-end gap-3">
              <a
                href="{% url 'list_siswa' %}"
                class="rounded-2xl border border-slate-200 px-5 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50 transition"
              >
                Batal
              </a>
              <button
                type="submit"
                class="rounded-2xl bg-brand-600 px-5 py-3 text-sm font-medium text-white shadow-lg shadow-brand-500/15 hover:bg-brand-700 transition"
              >
                Simpan User
              </button>
            </div>
          </form>

        </div>
      </main>
    </div>
  </body>
</html>
