<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinjam Buku - SIPUSTAKA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
  </head>
  <body class="bg-[#f1f5f9] text-slate-900 h-screen overflow-hidden">
    <div class="h-screen flex flex-col md:flex-row">
      
      <aside class="w-full md:w-64 h-screen bg-[#030712] text-slate-100 flex-none flex flex-col"></aside>

      <main class="flex-1 p-6 md:p-8 overflow-y-auto">
        <div class="mb-6">
          <a href="{% url 'list_peminjaman' %}" class="text-sm font-medium text-blue-600 hover:underline">← Batal & Kembali</a>
          <h3 class="text-3xl font-bold text-slate-900 tracking-tight mt-1">Pinjam Buku</h3>
        </div>

        <div class="bg-white rounded-[24px] border border-slate-100 shadow-sm p-6 max-w-4xl">
          <form method="POST">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              
              <div>
                <label class="block text-xs font-semibold uppercase text-slate-500 tracking-wider mb-2">Nama Peminjam</label>
                <select name="siswa_id" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500">
                  <option value="" disabled selected>Pilih Anggota Siswa</option>
                  {% for s in list_siswa %}
                  <option value="{{ s.id }}">{{ s.nama }} - {{ s.kelas }} ({{ s.nis }})</option>
                  {% endfor %}
                </select>
              </div>

              <div>
                <label class="block text-xs font-semibold uppercase text-slate-500 tracking-wider mb-2">Pilih Buku</label>
                <select name="buku_id" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500">
                  <option value="" disabled selected>Pilih Buku</option>
                  {% for b in list_buku %}
                  <option value="{{ b.id }}">{{ b.judul }} ({{ b.stok }} stok)</option>
                  {% endfor %}
                </select>
              </div>

              <div>
                <label class="block text-xs font-semibold uppercase text-slate-500 tracking-wider mb-2">Tanggal Pinjam</label>
                <input type="date" name="tanggal_pinjam" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500">
              </div>

              <div>
                <label class="block text-xs font-semibold uppercase text-slate-500 tracking-wider mb-2">Tanggal Jatuh Tempo</label>
                <input type="date" name="jatuh_tempo" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500">
              </div>

              <div class="md:col-span-2">
                <label class="block text-xs font-semibold uppercase text-slate-500 tracking-wider mb-2">Keperluan</label>
                <input type="text" name="keperluan" placeholder="Contoh: Bacaan pribadi / Tugas kelompok" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500">
              </div>

            </div>

            <div class="mt-8 flex justify-end gap-3 border-t border-slate-100 pt-6">
              <button type="submit" class="bg-[#2563eb] text-white px-6 py-2.5 rounded-xl font-medium text-sm hover:bg-blue-700 transition shadow-sm">
                Pinjam Buku
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
